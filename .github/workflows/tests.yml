name: Tests

on:
  pull_request:
  push:
    branches: [main]

env:
  PYTHONUTF8: 1

jobs:
  linux_tests:
    name: Ubuntu / ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    defaults:
      run:
        shell: bash

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: "password"
          MYSQL_DATABASE: "expanse"
          MYSQL_ROOT_HOST: "%"
        ports:
          - "3306:3306"
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: "password"
          POSTGRES_DB: "expanse"
        ports:
          - "5432:5432"
      redis:
        image: redis:8.6-alpine
        ports:
        - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install dependencies
        run: uv sync --group lint

      - name: Run tests
        run: uv run pytest
  tests:
    name: ${{ matrix.os }} / ${{ matrix.python-version }}
    runs-on: ${{ matrix.image }}
    strategy:
      matrix:
        os: [macOS, Windows]
        python-version: ["3.12", "3.13", "3.14"]
        include:
          - os: Windows
            image: windows-latest
          - os: macOS
            image: macos-latest
        exclude:
          - os: Windows
            python-version: "3.14"
    env:
      DATABASE_HOST: localhost
      DATABASE_NAME: expanse
      DATABASE_USER: expanse
      DATABASE_PASSWORD: password
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Setting up MySQL dependencies
        if: matrix.os == 'macOS'
        run: |
          brew install mysql-client pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix)/opt/mysql-client/lib/pkgconfig" >> $GITHUB_ENV

      - name: Setting up PostgreSQL dependencies
        if: matrix.os == 'macOS'
        run: |
          brew install postgresql@16
          echo "PATH=$(brew --prefix)/opt/postgresql@16/bin:$PATH" >> $GITHUB_ENV

      - name: Install dependencies
        run: uv sync --group lint

      - name: Run tests
        run: uv run pytest -m "not db and not redis"
